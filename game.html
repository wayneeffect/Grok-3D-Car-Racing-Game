<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Browser Racing Game</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 10px; left: 10px; color: white; z-index: 100;
    background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
  }
  #instructions {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px;
    text-align: center; font-size: 14px;
  }
</style>
</head>
<body>
<div id="ui">
  <div>Speed: <span id="speed">0</span> km/h</div>
  <div>Lap: <span id="lap">1</span></div>
</div>
<div id="instructions">
  ↑ / W = Accelerate  ↓ / S = Brake/Reverse  ← → = Steer  R = Reset
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// =============== BASIC 3D CAR RACING GAME ===============
let scene, camera, renderer;
let car, carBody, wheels = [];
let velocity = 0;
let steering = 0;
const maxSpeed = 2.5;
const acceleration = 0.08;
const friction = 0.95;
let keys = {};
let lap = 1;
let trackProgress = 0;

// Simple track boundaries (for collision)
const trackWidth = 40;

init();
animate();

function init() {
  // Scene setup
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x88ccff, 100, 400);

  // Camera (third person)
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  
  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(50, 100, 30);
  sun.castShadow = true;
  scene.add(sun);

  // Ground / Grass
  const groundGeo = new THREE.PlaneGeometry(500, 500);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x228822 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Road (simple oval-ish track using multiple segments)
  createRoad();

  // Car
  createCar();

  // Event listeners
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
  window.addEventListener('resize', onResize);
}

function createRoad() {
  // Main road plane
  const roadGeo = new THREE.PlaneGeometry(30, 300);
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.y = 0.1;
  scene.add(road);

  // Road borders
  for (let side = -1; side <= 1; side += 2) {
    const border = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.5, 300),
      new THREE.MeshLambertMaterial({ color: 0xff0000 })
    );
    border.position.set(side * 16, 0.3, 0);
    border.rotation.x = -Math.PI / 2;
    scene.add(border);
  }

  // Some trees / obstacles for visual reference
  for (let i = 0; i < 30; i++) {
    const tree = new THREE.Mesh(
      new THREE.CylinderGeometry(3, 5, 12, 8),
      new THREE.MeshLambertMaterial({ color: 0x116611 })
    );
    const x = (Math.random() - 0.5) * 200;
    const z = (Math.random() - 0.5) * 200;
    // Keep trees off the road
    if (Math.abs(x) < 20) continue;
    tree.position.set(x, 6, z);
    scene.add(tree);
  }
}

function createCar() {
  car = new THREE.Group();
  
  // Car body
  const bodyGeo = new THREE.BoxGeometry(6, 3, 12);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xff2222 });
  carBody = new THREE.Mesh(bodyGeo, bodyMat);
  carBody.position.y = 2;
  carBody.castShadow = true;
  car.add(carBody);

  // Cabin
  const cabinGeo = new THREE.BoxGeometry(4, 2, 6);
  const cabinMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.set(0, 3.5, -1);
  car.add(cabin);

  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 16);
  const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
  
  const positions = [
    { x: -3.2, z: 4 }, { x: 3.2, z: 4 },
    { x: -3.2, z: -4 }, { x: 3.2, z: -4 }
  ];
  
  positions.forEach(pos => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.z = Math.PI / 2;
    wheel.position.set(pos.x, 1.5, pos.z);
    wheel.castShadow = true;
    car.add(wheel);
    wheels.push(wheel);
  });

  car.position.set(0, 1, 50);
  scene.add(car);
}

function animate() {
  requestAnimationFrame(animate);

  // Controls
  if (keys['w'] || keys['arrowup']) velocity = Math.min(velocity + acceleration, maxSpeed);
  if (keys['s'] || keys['arrowdown']) velocity = Math.max(velocity - acceleration * 1.8, -maxSpeed / 2);
  if (!keys['w'] && !keys['arrowup'] && !keys['s'] && !keys['arrowdown']) {
    velocity *= friction;
  }

  if (keys['a'] || keys['arrowleft']) steering = Math.min(steering + 0.04, 0.6);
  if (keys['d'] || keys['arrowright']) steering = Math.max(steering - 0.04, -0.6);
  if (!keys['a'] && !keys['d'] && !keys['arrowleft'] && !keys['arrowright']) {
    steering *= 0.85;
  }

  // Move car
  const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
  car.position.x += forward.x * velocity;
  car.position.z += forward.z * velocity;

  // Turn
  if (Math.abs(velocity) > 0.1) {
    car.rotation.y += steering * (velocity / maxSpeed) * 0.08;
  }

  // Gentle auto-center steering
  steering *= 0.92;

  // Simple lap progress (rough oval)
  trackProgress += Math.abs(velocity) * 0.3;
  if (trackProgress > 800) {
    lap++;
    trackProgress = 0;
    document.getElementById('lap').textContent = lap;
  }

  // Update speedometer
  const speedKmh = Math.abs(Math.round(velocity * 45));
  document.getElementById('speed').textContent = speedKmh;

  // Camera follow (third person)
  const idealOffset = new THREE.Vector3(0, 25, 40);
  idealOffset.applyQuaternion(car.quaternion);
  idealOffset.add(car.position);
  
  camera.position.lerp(idealOffset, 0.1);
  camera.lookAt(car.position.x, car.position.y + 5, car.position.z);

  // Simple boundary collision
  if (Math.abs(car.position.x) > trackWidth) {
    car.position.x = Math.sign(car.position.x) * trackWidth;
    velocity *= 0.6;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Reset car position
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'r') {
    car.position.set(0, 1, 50);
    car.rotation.y = 0;
    velocity = 0;
    steering = 0;
  }
});
</script>
</body>
</html>
